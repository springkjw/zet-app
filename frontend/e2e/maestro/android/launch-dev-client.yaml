appId: com.geniusproject.zet
name: Launch Android dev client for auth flows
tags:
  - auth
  - android

---
- launchApp:
    appId: com.geniusproject.zet
    clearState: true
- extendedWaitUntil:
    visible: Development Build
    timeout: 20000
- runFlow:
    when:
      visible: "http://10.0.2.2:8082"
    commands:
      - tapOn: "http://10.0.2.2:8082"
- runFlow:
    when:
      visible: Continue
    commands:
      - tapOn: Continue
- runFlow:
    when:
      visible: Close
    commands:
      - tapOn: Close
