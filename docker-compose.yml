version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: zet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zet
      POSTGRES_USER: zet
      POSTGRES_PASSWORD: zet
    ports:
      - "5432:5432"
    volumes:
      - zet-postgres-data:/var/lib/postgresql/data

volumes:
  zet-postgres-data:
